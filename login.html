<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MG Calçados</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f9;
      --card: #ffffff;
      --muted: #6b7280;
      --text: #0f172a;
      --accent: #ff6b00; /* laranja Centauro-like */
      --accent-600: #0b3d91; /* azul escuro */
      font-family: 'Inter', 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, var(--bg) 0%, #e9eef6 100%);
      color: var(--text);
    }

    .container-auth {
      width: min(560px, calc(100vw - 32px));
      padding: 2px;
      border-radius: 12px;
      background: transparent;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
    }

    .auth-card {
      background: var(--card);
      border-radius: 12px;
      padding: 36px 36px;
      box-shadow: 0 10px 30px rgba(2,6,23,0.06);
      border: 1px solid rgba(15, 23, 42, 0.04);
    }

    .auth-header { display:flex; gap:16px; align-items:center; margin-bottom:20px }
    .brand-mark { width:64px; height:64px; display:block; border-radius:10px; overflow:hidden; box-shadow:0 8px 20px rgba(11,61,145,0.08) }
    .brand-mark img, .brand-mark svg { width:100%; height:100%; display:block; object-fit:cover }
    .auth-header h1 { font-size:1.25rem; margin:0; color:var(--text); font-weight:800 }
    .auth-header small { display:block; color:var(--muted); margin-top:6px; font-size:0.92rem; font-weight:600 }

    .auth-card p { color:var(--muted); margin:0 0 18px; font-size:0.95rem; line-height:1.6; max-width:56ch }

    .auth-tabs { display:flex; gap:10px; margin-bottom:16px }
    .tab-button { border:1px solid rgba(15,23,42,0.06); background:transparent; padding:10px 12px; color:var(--muted); border-radius:8px; font-weight:700; cursor:pointer; transition:all 0.12s }
    .tab-button.active { color:var(--card); background: linear-gradient(90deg,var(--accent),var(--accent-600)); box-shadow:0 8px 20px rgba(11,61,145,0.06) }

    .auth-message { border-radius:8px; padding:12px 14px; margin-bottom:14px; font-size:0.95rem; line-height:1.3; border:1px solid transparent; background:rgba(88,102,130,0.02); color:var(--muted) }
    .auth-message.success { border-color: rgba(11,61,145,0.08); background: rgba(11,61,145,0.04); color:var(--accent-600) }
    .auth-message.error { border-color: rgba(244,63,94,0.12); background: rgba(244,63,94,0.04); color:#c5304a }

    .form-group { margin-bottom:14px }
    label { display:block; margin-bottom:8px; color:var(--muted); font-weight:600; font-size:0.95rem }
    input[type="text"], input[type="email"], input[type="password"] { width:100%; padding:10px 12px; border-radius:8px; border:1px solid rgba(15,23,42,0.06); background:transparent; color:var(--text); font-size:1rem }
    input:focus { outline:none; border-color:var(--accent); box-shadow:0 6px 18px rgba(11,61,145,0.06) }

    .btn-auth { width:100%; padding:12px 16px; margin-top:6px; background: linear-gradient(90deg,var(--accent),var(--accent-600)); color:white; border:none; border-radius:8px; font-size:0.98rem; font-weight:800; cursor:pointer; box-shadow:0 8px 26px rgba(11,61,145,0.08); transition:transform 0.12s }
    .btn-auth:hover { transform:translateY(-2px); box-shadow:0 12px 36px rgba(11,61,145,0.12) }

    .divider { display:flex; align-items:center; gap:12px; margin:22px 0; color:var(--muted); font-size:0.88rem }
    .divider::before, .divider::after { content:""; flex:1; height:1px; background:rgba(15,23,42,0.06) }

    .auth-links { text-align:center; margin-top:8px }
    .auth-links a, .btn-home { color:var(--accent); text-decoration:none; font-weight:700 }
    .auth-links a:hover, .btn-home:hover { color:var(--accent-600) }

    .hidden { display:none }

    /* Panels animation helpers */
    .panel { opacity:0; transform:translateY(8px); transition: opacity 220ms ease, transform 220ms ease }
    .panel.visible { opacity:1; transform:translateY(0) }

    @media (max-width:540px) { .container-auth { width:min(100vw - 24px,100%) } .auth-card { padding:28px 20px } .auth-tabs { grid-template-columns:1fr } }
  </style>
</head>
<body>

<div class="container-auth">
  <div class="auth-card">
      <div class="auth-header">
        <div class="brand-mark"><img src="logo.svg" alt="MG"></div>
        <div>
          <h1>MG Calçados</h1>
          <small>Conta única para acessar carrinho, pedidos e ofertas exclusivas.</small>
        </div>
      </div>
      <p>Entre na conta ou crie uma nova conta rapidamente para continuar suas compras.</p>
    <div class="auth-tabs">
      <button class="tab-button active" id="tabLogin" type="button" onclick="mostrarLogin()">Entrar na conta</button>
      <button class="tab-button" id="tabCriar" type="button" onclick="mostrarCadastro()">Criar conta</button>
    </div>

    <div id="authMessage" class="auth-message hidden"></div>

    <div id="loginPanel" class="panel visible">
      <form id="loginForm" onsubmit="fazerLogin(event)">
        <div class="form-group">
          <label for="user">Usuário ou e‑mail</label>
          <input type="text" id="user" required placeholder="seu usuário ou email">
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-auth">Entrar</button>
      </form>
    </div>

    <div id="cadastroPanel" class="panel hidden">
      <form id="cadastroForm" onsubmit="salvarCadastro(event)">
        <div class="form-group">
          <label for="usuario">Nome de usuário</label>
          <input type="text" id="usuario" required placeholder="Digite seu usuário">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="seu@email.com">
        </div>

        <div class="form-group">
          <label for="senhaCadastro">Senha</label>
          <input type="password" id="senhaCadastro" required placeholder="••••••••">
        </div>

        <div class="form-group">
          <label for="confirmarSenha">Confirmar senha</label>
          <input type="password" id="confirmarSenha" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-auth">Criar conta</button>
      </form>
    </div>

    <div class="divider"></div>

    <div class="auth-links">
      <p><a href="index.html" class="btn-home">← Voltar ao Início</a></p>
    </div>
  </div>
</div>

<script>
function getUsuariosStorage() {
  const usuarios = localStorage.getItem("usuarios");
  if (!usuarios) return [];
  try {
    return JSON.parse(usuarios);
  } catch (error) {
    console.warn("Erro ao ler usuários do localStorage:", error);
    return [];
  }
}

function salvarUsuariosStorage(usuarios) {
  localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

function mostrarMensagem(mensagem, tipo = "error") {
  const authMessage = document.getElementById("authMessage");
  authMessage.textContent = mensagem;
  authMessage.className = `auth-message ${tipo}`;
  authMessage.classList.remove("hidden");
}

function limparMensagem() {
  const authMessage = document.getElementById("authMessage");
  authMessage.textContent = "";
  authMessage.className = "auth-message hidden";
}
function showPanel(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  panel.classList.remove('hidden');
  requestAnimationFrame(() => panel.classList.add('visible'));
}

function hidePanel(id) {
  const panel = document.getElementById(id);
  if (!panel) return;
  panel.classList.remove('visible');
  setTimeout(() => panel.classList.add('hidden'), 240);
}

function mostrarLogin(mensagem = "", tipo = "success") {
  hidePanel('cadastroPanel');
  showPanel('loginPanel');
  document.getElementById("tabLogin").classList.add("active");
  document.getElementById("tabCriar").classList.remove("active");
  if (mensagem) mostrarMensagem(mensagem, tipo); else limparMensagem();
}

function mostrarCadastro() {
  hidePanel('loginPanel');
  showPanel('cadastroPanel');
  document.getElementById("tabLogin").classList.remove("active");
  document.getElementById("tabCriar").classList.add("active");
}

function fazerLogin(event) {
  event.preventDefault();
  const user = document.getElementById("user").value.trim();
  const senha = document.getElementById("senha").value;
  if (!user || !senha) {
    mostrarMensagem("Preencha usuário/email e senha para entrar.", "error");
    return;
  }

  const usuarios = getUsuariosStorage();
  const usuarioEncontrado = usuarios.find(u => u.usuario === user || u.email === user);
  if (!usuarioEncontrado) {
    mostrarMensagem("Usuário não encontrado. Crie sua conta primeiro.", "error");
    mostrarCadastro();
    return;
  }

  if (usuarioEncontrado.senha !== senha) {
    mostrarMensagem("Senha incorreta. Tente novamente.", "error");
    return;
  }

  localStorage.setItem("usuario", JSON.stringify(usuarioEncontrado));
  mostrarMensagem(`Bem-vindo ${usuarioEncontrado.usuario}! Redirecionando...`, "success");
  setTimeout(() => { window.location.href = "index.html"; }, 900);
}

function salvarCadastro(event) {
  event.preventDefault();

  const usuario = document.getElementById("usuario").value.trim();
  const email = document.getElementById("email").value.trim().toLowerCase();
  const senha = document.getElementById("senhaCadastro").value;
  const confirmarSenha = document.getElementById("confirmarSenha").value;

  if (!usuario || !email || !senha || !confirmarSenha) {
    mostrarMensagem("Preencha todos os campos antes de continuar.", "error");
    return;
  }

  if (senha !== confirmarSenha) {
    mostrarMensagem("As senhas não coincidem. Tente novamente.", "error");
    return;
  }

  const usuarios = getUsuariosStorage();
  const existeUsuario = usuarios.some(u => u.usuario === usuario || u.email === email);
  if (existeUsuario) {
    mostrarMensagem("Já existe um cadastro com este usuário ou email. Faça login ou use outro email.", "error");
    return;
  }

  usuarios.push({ usuario, email, senha });
  salvarUsuariosStorage(usuarios);

  mostrarLogin("🎉 Conta criada com sucesso! Agora faça login.", "success");
}

mostrarLogin();
</script>

</body>
</html>
