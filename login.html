<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - MG Calçados</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .container-auth {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .auth-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
    }

    .auth-card h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .auth-card p {
      text-align: center;
      color: #999;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.3s ease;
      background: white;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      margin-top: 10px;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 25px 0;
      color: #999;
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .auth-links {
      text-align: center;
      margin-top: 20px;
    }

    .auth-links a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .auth-links a:hover {
      color: #764ba2;
    }

    .btn-home {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-home:hover {
      transform: translateX(-5px);
      background: #764ba2;
    }
  </style>
</head>
<body>

<div class="container-auth">
  <div class="auth-card">
    <h1>👟 MG Calçados</h1>
    <p>Bem-vindo! Faça login para continuar</p>
    
    <form id="loginForm" onsubmit="fazerLogin(event)">
      <div class="form-group">
        <label for="user">👤 Usuário</label>
        <input type="text" id="user" required placeholder="seu usuário">
      </div>

      <div class="form-group">
        <label for="senha">🔐 Senha</label>
        <input type="password" id="senha" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn-auth">🔓 Entrar</button>
    </form>

    <div class="divider">OU</div>

    <div class="auth-links">
      <p style="margin-top: 20px;"><a href="index.html" class="btn-home">← Voltar ao Início</a></p>
    </div>
  </div>
</div>

<script>
function fazerLogin(event) {
  event.preventDefault();
  const user = document.getElementById("user").value;
  
  localStorage.setItem("usuario", user);
  alert("✅ Bem-vindo " + user + "! Login realizado com sucesso!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
